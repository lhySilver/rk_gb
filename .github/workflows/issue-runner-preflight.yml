name: issue-runner-preflight

on:
  workflow_dispatch:
    inputs:
      run_local_smoke:
        description: Run local smoke test after basic preflight
        required: false
        default: true
        type: boolean
      run_build_verify:
        description: Run RK830 isolated build verify after basic preflight
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: issue-runner-preflight
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      runner_ready: ${{ steps.evaluate.outputs.runner_ready }}
      reason: ${{ steps.evaluate.outputs.reason }}
    env:
      ISSUE_BOT_RUNNER_READY: ${{ vars.ISSUE_BOT_RUNNER_READY }}
      ISSUE_FIX_COMMAND: ${{ vars.ISSUE_FIX_COMMAND }}
    steps:
      - id: evaluate
        run: |
          set -euo pipefail
          runner_ready=false
          reason="ISSUE_BOT_RUNNER_READY is not set to true"
          if [ "${ISSUE_BOT_RUNNER_READY:-}" = "true" ]; then
            if [ -n "${ISSUE_FIX_COMMAND:-}" ]; then
              runner_ready=true
              reason="runner gate passed"
            else
              reason="ISSUE_FIX_COMMAND repo variable is empty"
            fi
          fi
          {
            printf 'runner_ready=%s\n' "$runner_ready"
            printf 'reason=%s\n' "$reason"
          } >> "$GITHUB_OUTPUT"

      - name: Append gate summary
        run: |
          set -euo pipefail
          {
            printf '# Runner Preflight Gate\n\n'
            printf -- '- runner_ready: %s\n' '${{ steps.evaluate.outputs.runner_ready }}'
            printf -- '- reason: %s\n' '${{ steps.evaluate.outputs.reason }}'
            printf -- '- next_step: set repo variable ISSUE_BOT_RUNNER_READY=true after the self-hosted runner and ISSUE_FIX_COMMAND are ready\n'
          } >> "$GITHUB_STEP_SUMMARY"

  preflight:
    needs: gate
    if: ${{ needs.gate.outputs.runner_ready == 'true' }}
    runs-on:
      - self-hosted
      - linux
      - rk830-builder
    env:
      ISSUE_FIX_COMMAND: ${{ vars.ISSUE_FIX_COMMAND }}
      RK_TOOLCHAIN_BIN: ${{ vars.RK_TOOLCHAIN_BIN }}
      CMAKE_BIN: ${{ vars.CMAKE_BIN }}
      ISSUE_BOT_STATE_DIR: /tmp/rk_gb-issue-bot-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run runner preflight
        run: |
          set -euo pipefail
          args=(--repo-dir "$GITHUB_WORKSPACE")
          if [ "${{ inputs.run_local_smoke }}" = "true" ]; then
            args+=(--with-local-smoke)
          fi
          if [ "${{ inputs.run_build_verify }}" = "true" ]; then
            args+=(--with-build-verify)
          fi
          bash tools/issue_bot/runner_preflight.sh "${args[@]}"

      - name: Append preflight summary
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -f "$ISSUE_BOT_STATE_DIR/preflight-summary.md" ]; then
            cat "$ISSUE_BOT_STATE_DIR/preflight-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '# Runner Preflight Summary\n\n- summary: no preflight summary file found\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$ISSUE_BOT_STATE_DIR/smoke-test/last-run-summary.md" ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat "$ISSUE_BOT_STATE_DIR/smoke-test/last-run-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload preflight state
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: issue-runner-preflight-state-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ISSUE_BOT_STATE_DIR }}
          if-no-files-found: warn
          retention-days: 7
